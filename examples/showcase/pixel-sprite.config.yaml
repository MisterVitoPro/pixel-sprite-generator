# pixel-sprite-generator showcase config
# This example uses mode: grid so it renders deterministically from hand-authored shape files
# with no live backend required. Suitable for CI and offline demos.

# Sprite output size in pixels
size: 16

# Force the deterministic shape-grid renderer; no image model required
mode: grid

# Directories (relative to this file)
sprites_dir: art/sprites
shapes_dir: art/shapes
palettes_dir: art/palettes
out_dir: assets/sprites
